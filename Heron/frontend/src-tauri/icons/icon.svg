<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="wing" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ecca3"/>
      <stop offset="100%" style="stop-color:#45b7aa"/>
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="230" fill="none" stroke="#4ecca3" stroke-width="4"/>
  
  <!-- Heron Head -->
  <ellipse cx="256" cy="180" rx="55" ry="70" fill="#f8f8f8"/>
  
  <!-- Beak -->
  <path d="M256 140 L310 170 L256 200 Z" fill="#f4a261"/>
  <path d="M256 140 L202 170 L256 200 Z" fill="#e76f51"/>
  
  <!-- Eye -->
  <circle cx="235" cy="165" r="12" fill="#1a1a2e"/>
  <circle cx="238" cy="162" r="4" fill="#fff"/>
  
  <!-- Wing (AI Symbol) -->
  <path d="M130 320 Q180 200 256 220 Q332 200 382 320" 
        fill="none" stroke="url(#wing)" stroke-width="20" stroke-linecap="round"/>
  <path d="M150 300 Q190 220 256 235 Q322 220 362 300" 
        fill="none" stroke="#4ecca3" stroke-width="8" stroke-linecap="round" stroke-dasharray="20 10"/>
  
  <!-- Body -->
  <ellipse cx="256" cy="320" rx="70" ry="90" fill="#e8e8e8"/>
  
  <!-- Text -->
  <text x="256" y="450" text-anchor="middle" font-family="Arial, sans-serif" 
        font-size="48" font-weight="bold" fill="#4ecca3">HERON IA</text>
  <text x="256" y="480" text-anchor="middle" font-family="Arial, sans-serif" 
        font-size="18" fill="#888">Inteligência Artificial Local</text>
</svg>